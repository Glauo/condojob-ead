services:
  db:
    image: postgres:16-alpine
    container_name: condojob_ead_db
    environment:
      POSTGRES_DB: condojob_ead
      POSTGRES_USER: condojob
      POSTGRES_PASSWORD: condojob
    ports:
      - "5435:5432"
    volumes:
      - condojob_ead_pgdata:/var/lib/postgresql/data

  app:
    build: .
    container_name: condojob_ead_app
    ports:
      - "3002:3000"
    environment:
      DATABASE_URL: postgresql://condojob:condojob@db:5432/condojob_ead
      JWT_SECRET: condojob-ead-secret-2026-mude-em-producao
      ADMIN_KEY: condojob2026
      NODE_ENV: production
    depends_on:
      - db

volumes:
  condojob_ead_pgdata:
